<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRT Arrivals</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f4f4f2; --bg3: #ebebea;
    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --success: #3b6d11; --success-bg: #eaf3de;
    --warn: #854f0b; --warn-bg: #faeeda;
    --danger: #a32d2d; --danger-bg: #fcebeb;
    --accent: #1a6b3c; --accent-bg: #e6f4ec;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333330;
      --text: #f0efe8; --text2: #b4b2a9; --text3: #888780;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --success: #c0dd97; --success-bg: #173404;
      --warn: #FAC775; --warn-bg: #412402;
      --danger: #f09595; --danger-bg: #501313;
      --accent: #6fcf97; --accent-bg: #0d2e1a;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 16px 16px 0; }
  header h1 { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
  header p { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); }
  .tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .search-bar { padding: 12px 16px; display: flex; gap: 8px; border-bottom: 0.5px solid var(--border); }
  .search-bar input { flex: 1; height: 40px; padding: 0 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 15px; }
  .search-bar input:focus { outline: none; border-color: var(--text3); }
  .search-bar button { height: 40px; padding: 0 16px; border: none; border-radius: var(--radius); background: var(--accent); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; }
  .search-bar button:active { opacity: 0.8; }
  .breadcrumb { padding: 8px 16px; font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; border-bottom: 0.5px solid var(--border); min-height: 34px; background: var(--bg2); }
  .breadcrumb span { color: var(--text); font-weight: 500; }
  .breadcrumb a { color: var(--text2); cursor: pointer; text-decoration: underline; }
  .content { flex: 1; padding: 12px 16px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; }
  .card-header { padding: 12px 14px 10px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
  .card-header-left h2 { font-size: 14px; font-weight: 500; }
  .card-header-left p { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .fav-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 0 0 0 8px; line-height: 1; flex-shrink: 0; }
  .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; }
  .list-item:last-child { border-bottom: none; }
  .list-item:active { background: var(--bg2); }
  .list-item-name { font-size: 14px; }
  .list-item-arrow { color: var(--text3); font-size: 18px; flex-shrink: 0; margin-left: 8px; }
  .dir-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
  .dir-tile { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 18px 12px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; }
  .dir-tile:active { background: var(--bg3); }
  .dir-arrow { font-size: 24px; color: var(--text2); }
  .dir-label { font-size: 13px; font-weight: 500; }
  .dir-dest { font-size: 11px; color: var(--text3); text-align: center; }
  .arrival-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 0.5px solid var(--border); }
  .arrival-row:last-child { border-bottom: none; }
  .arrival-dest { font-size: 13px; }
  .arrival-detail { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .arrival-time { font-size: 16px; font-weight: 600; flex-shrink: 0; margin-left: 12px; }
  .t-now { color: var(--danger); } .t-soon { color: var(--warn); } .t-ok { color: var(--success); } .t-later { color: var(--text3); }
  .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 99px; margin-left: 6px; vertical-align: middle; }
  .badge-live { background: var(--success-bg); color: var(--success); }
  .badge-sched { background: var(--bg2); color: var(--text3); }
  .notif-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--accent-bg); border-top: 0.5px solid var(--border); font-size: 13px; color: var(--text2); }
  .notif-bar button { margin-left: auto; background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .progress-bar { height: 3px; background: var(--border); }
  .progress-fill { height: 100%; background: var(--accent); transition: width 1s linear; }
  .refresh-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; font-size: 12px; color: var(--text3); background: var(--bg2); border-top: 0.5px solid var(--border); }
  .refresh-bar button { background: none; border: 0.5px solid var(--border2); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--text2); cursor: pointer; }
  .fav-item { display: flex; align-items: center; padding: 12px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; gap: 12px; }
  .fav-item:last-child { border-bottom: none; }
  .fav-item:active { background: var(--bg2); }
  .fav-icon { font-size: 20px; flex-shrink: 0; }
  .fav-info { flex: 1; }
  .fav-name { font-size: 14px; font-weight: 500; }
  .fav-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .fav-delete { background: none; border: none; font-size: 18px; color: var(--text3); cursor: pointer; padding: 4px; flex-shrink: 0; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 1.7; }
  .empty .icon { font-size: 36px; margin-bottom: 8px; }
  .spinner-wrap { display: flex; align-items: center; gap: 10px; padding: 20px 0; color: var(--text3); font-size: 13px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--text3); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { background: var(--danger-bg); color: var(--danger); border-radius: var(--radius); padding: 12px; font-size: 13px; }
  .ext-link { display: block; text-align: center; font-size: 12px; color: var(--text3); padding: 10px; text-decoration: none; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🚌 DRT Arrivals</h1>
    <p>Durham Region Transit · transsee.ca</p>
    <div class="tabs">
      <div class="tab active" id="tab-search" onclick="switchTab('search')">Search</div>
      <div class="tab" id="tab-favs" onclick="switchTab('favs')">⭐ Favourites</div>
    </div>
  </header>
  <div id="search-panel">
    <div class="search-bar">
      <input id="route-input" type="text" inputmode="numeric" placeholder="Route number (e.g. 900, 905)" />
      <button onclick="searchRoute()">Search</button>
    </div>
    <div class="breadcrumb" id="breadcrumb" style="display:none;"></div>
    <div class="content" id="content">
      <div class="empty"><div class="icon">🚌</div>Enter a route number to get started</div>
    </div>
  </div>
  <div id="favs-panel" style="display:none;">
    <div class="content" id="favs-content"></div>
  </div>
</div>
<script>
  const API = "/api";
  const TRANSSEE = "https://transsee.ca";
  const REFRESH_INTERVAL = 30;
  let state = { route: null, direction: null, currentStop: null, _directions: [], _stops: [] };
  let refreshTimer = null;
  let refreshCountdown = REFRESH_INTERVAL;
  let notifPermission = (typeof Notification !== 'undefined') ? Notification.permission : 'denied';
  let notifiedKeys = new Set();

  // ── Tabs ──────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('tab-search').className = 'tab' + (tab === 'search' ? ' active' : '');
    document.getElementById('tab-favs').className = 'tab' + (tab === 'favs' ? ' active' : '');
    document.getElementById('search-panel').style.display = tab === 'search' ? '' : 'none';
    document.getElementById('favs-panel').style.display = tab === 'favs' ? '' : 'none';
    if (tab === 'favs') renderFavs();
  }

  // ── Favourites ────────────────────────────────────────────────────────────
  function getFavs() { try { return JSON.parse(localStorage.getItem('drt-favs') || '[]'); } catch { return []; } }
  function saveFavs(f) { localStorage.setItem('drt-favs', JSON.stringify(f)); }
  function isFav(key) { return getFavs().some(f => f.key === key); }

  function toggleFav(stop, route, dirLabel) {
    let favs = getFavs();
    const idx = favs.findIndex(f => f.key === stop.key);
    if (idx >= 0) { favs.splice(idx, 1); } else { favs.push({ key: stop.key, name: stop.name, route, dirLabel }); }
    saveFavs(favs);
    return idx < 0;
  }

  function renderFavs() {
    const favs = getFavs();
    const el = document.getElementById('favs-content');
    if (!favs.length) {
      el.innerHTML = '<div class="empty"><div class="icon">⭐</div>No favourites yet.<br>Search for a stop and tap ☆ to save it here.</div>'; return;
    }
    el.innerHTML = '<div class="section-label" style="margin-top:4px;">Saved stops</div><div class="card">' +
      favs.map((f, i) => `<div class="fav-item" onclick="loadFav(${i})">
        <div class="fav-icon">📍</div>
        <div class="fav-info"><div class="fav-name">${f.name}</div><div class="fav-sub">Route ${f.route} · ${f.dirLabel}</div></div>
        <button class="fav-delete" onclick="deleteFav(event,${i})">✕</button>
      </div>`).join('') + '</div>';
  }

  function deleteFav(e, idx) { e.stopPropagation(); const f = getFavs(); f.splice(idx,1); saveFavs(f); renderFavs(); }

  function loadFav(idx) {
    const fav = getFavs()[idx]; if (!fav) return;
    switchTab('search');
    document.getElementById('route-input').value = fav.route;
    state.route = fav.route;
    state.direction = { label: fav.dirLabel };
    state.currentStop = { key: fav.key, name: fav.name };
    setBreadcrumb([`<a onclick="searchRoute()">Route ${fav.route}</a>`, `<span>${fav.name}</span>`]);
    loadArrivals({ key: fav.key, name: fav.name });
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setContent(html) { document.getElementById('content').innerHTML = html; }
  function loading(msg) { setContent('<div class="spinner-wrap"><div class="spinner"></div>' + msg + '</div>'); }
  function setBreadcrumb(parts) {
    const el = document.getElementById('breadcrumb');
    el.style.display = parts.length ? 'flex' : 'none';
    el.innerHTML = parts.map((p,i) => i < parts.length-1 ? p+' <span style="color:var(--text3)">›</span>' : p).join(' ');
  }
  async function apiFetch(url) {
    const r = await fetch(url); if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json(); if (d.error) throw new Error(d.error); return d;
  }

  // ── Search ────────────────────────────────────────────────────────────────
  document.getElementById('route-input').addEventListener('keydown', e => { if (e.key==='Enter') searchRoute(); });

  async function searchRoute() {
    stopRefresh();
    const r = document.getElementById('route-input').value.trim(); if (!r) return;
    state = { route: r, direction: null, currentStop: null, _directions: [], _stops: [] };
    setBreadcrumb([`<span>Route ${r}</span>`]);
    loading('Loading directions for route '+r+'…');
    try { const data = await apiFetch(API+'/routes/'+encodeURIComponent(r)+'/stops'); showDirections(data); }
    catch(e) { setContent('<div class="err">Could not load route '+r+'. Check the number and try again.<br><small>'+e.message+'</small></div>'); }
  }

  // ── Directions ────────────────────────────────────────────────────────────
  function showDirections(data) {
    if (!data.directions || !data.directions.length) { setContent('<div class="err">No stops found for route '+state.route+'.</div>'); return; }
    state._directions = data.directions;
    const tiles = data.directions.map((d,i) => {
      const parts = d.label.split('→');
      return '<div class="dir-tile" onclick="pickDirection('+i+')">' +
        '<div class="dir-arrow">'+(d.arrow||'·')+'</div>' +
        '<div class="dir-label">'+parts[0].trim()+'</div>' +
        '<div class="dir-dest">'+(parts[1] ? '→ '+parts[1].trim() : '')+'</div>' +
        '</div>';
    }).join('');
    setContent('<div class="section-label">Choose direction</div><div class="card">' +
      '<div class="card-header"><div class="card-header-left"><h2>Route '+state.route+'</h2><p>Which way are you heading?</p></div></div>' +
      '<div class="dir-grid">'+tiles+'</div></div>' +
      '<a class="ext-link" href="'+TRANSSEE+'/stoplist?a=durham&r='+state.route+'" target="_blank">View on transsee.ca ↗</a>');
  }

  function pickDirection(idx) {
    const dir = state._directions[idx]; state.direction = dir;
    setBreadcrumb([`<a onclick="backToDirections()">Route ${state.route}</a>`, '<span>'+dir.label.split('→')[0].trim()+'</span>']);
    showStops(dir);
  }

  function backToDirections() { stopRefresh(); state.direction = null; setBreadcrumb([`<span>Route ${state.route}</span>`]); showDirections({directions: state._directions}); }

  // ── Stops ─────────────────────────────────────────────────────────────────
  function showStops(dir) {
    state._stops = dir.stops;
    const items = dir.stops.map((s,i) =>
      '<div class="list-item" onclick="pickStop('+i+')"><div class="list-item-name">'+s.name+'</div><div class="list-item-arrow">›</div></div>'
    ).join('');
    setContent('<div class="section-label">Choose stop</div><div class="card">' +
      '<div class="card-header"><div class="card-header-left"><h2>'+dir.label+'</h2><p>'+dir.stops.length+' stops</p></div></div>' +
      items+'</div>');
  }

  function pickStop(idx) {
    const stop = state._stops[idx]; state.currentStop = stop;
    const d = state.direction?.label.split('→')[0].trim()||'';
    setBreadcrumb([`<a onclick="backToDirections()">Route ${state.route}</a>`, `<a onclick="backToStops()">${d}</a>`, '<span>'+stop.name+'</span>']);
    loadArrivals(stop);
  }

  function backToStops() { stopRefresh(); setBreadcrumb([`<a onclick="backToDirections()">Route ${state.route}</a>`, '<span>'+(state.direction?.label.split('→')[0].trim()||'')+'</span>']); showStops(state.direction); }

  // ── Arrivals ──────────────────────────────────────────────────────────────
  function loadArrivals(stop) {
    stopRefresh(); state.currentStop = stop;
    const favved = isFav(stop.key);
    const transseeUrl = TRANSSEE+'/predict?s='+stop.key;
    const dirShort = state.direction?.label.split('→')[0].trim()||'';
    setContent(
      '<div class="section-label">Live arrivals</div>' +
      '<div class="card">' +
        '<div class="card-header"><div class="card-header-left"><h2>📍 '+stop.name+'</h2><p>Route '+state.route+' · '+dirShort+'</p></div>' +
        '<button class="fav-btn" onclick="handleFav()" title="'+(favved?'Remove':'Add')+' favourite">'+(favved?'⭐':'☆')+'</button></div>' +
        '<div style="padding:16px 14px;display:flex;flex-direction:column;gap:12px;">' +
          '<div style="font-size:13px;color:var(--text2);line-height:1.6;">Tap below to see live arrival times on TransSee.</div>' +
          '<a href="'+transseeUrl+'" target="_blank" style="display:block;text-align:center;background:var(--accent);color:#fff;text-decoration:none;padding:12px;border-radius:var(--radius);font-size:15px;font-weight:500;">🚌 View live arrivals ↗</a>' +
        '</div>' +
      '</div>'
    );
  }

  function handleFav() {
    if (!state.currentStop) return;
    toggleFav(state.currentStop, state.route, state.direction?.label.split('→')[0].trim()||'');
    loadArrivals(state.currentStop);
  }

  // ── Auto-refresh ──────────────────────────────────────────────────────────
  function startRefresh(stop) {
    stopRefresh(); refreshCountdown = REFRESH_INTERVAL;
    refreshTimer = setInterval(() => {
      refreshCountdown--;
      const lbl = document.getElementById('refresh-label');
      const bar = document.getElementById('progress');
      if (lbl) lbl.textContent = 'Refreshes in '+refreshCountdown+'s';
      if (bar) bar.style.width = ((refreshCountdown/REFRESH_INTERVAL)*100)+'%';
      if (refreshCountdown <= 0) loadArrivals(stop);
    }, 1000);
  }

  function stopRefresh() { if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; } }

  // ── Push notifications ────────────────────────────────────────────────────
  async function requestNotifPermission() {
    if (typeof Notification === 'undefined') { alert('Notifications are not supported in this browser.'); return; }
    const result = await Notification.requestPermission();
    notifPermission = result;
    if (result === 'granted' && state.currentStop) loadArrivals(state.currentStop);
  }

  function checkNotifications(arrivals, stop) {
    if (notifPermission !== 'granted' || !arrivals) return;
    arrivals.forEach(a => {
      const mins = a.minutes ?? 99;
      if (mins <= 5) {
        const key = stop.key + '-' + a.time;
        if (!notifiedKeys.has(key)) {
          notifiedKeys.add(key);
          new Notification('🚌 Route ' + state.route + (mins<=1?' arriving now':' in '+mins+' min'), {
            body: 'at ' + stop.name + (a.time ? ' at ' + a.time : ''),
            icon: '/favicon.ico'
          });
          setTimeout(() => notifiedKeys.delete(key), 10*60*1000);
        }
      }
    });
  }
</script>
</body>
</html>
